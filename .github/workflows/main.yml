name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip TouchNavGitHub.zip
      - name: Build APK
        run: |
          cd TouchNavGH
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: TouchNav-APK
          path: TouchNavGH/app/build/outputs/apk/debug/app-debug.apk
