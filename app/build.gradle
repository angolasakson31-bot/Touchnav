plugins {
    id 'com.android.application'
}

android {
    namespace "com.touchnav.app"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.touchnav.app"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 2
        versionName "1.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug {
            applicationIdSuffix ""
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}
